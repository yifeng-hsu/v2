    <title>醫用英語 - 四模式邏輯版</title>
    <style>
        :root { --primary: #3498db; --bg: #2c3e50; --accent: #2ecc71; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; }
        .container { width: 100%; max-width: 500px; }
        
        .settings-panel { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; text-align: center; }
        input[type="range"] { width: 100%; margin: 15px 0 5px 0; -webkit-appearance: none; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #7f8c8d; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%; background: var(--accent); margin-top: -9px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        label { font-size: 0.95em; color: #bdc3c7; font-weight: bold; display: block; }
        #voice-status { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; color: #f1c40f; }
        
        .menu-item { background: white; color: #2c3e50; padding: 18px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; border-left: 6px solid var(--primary); font-size: 1.1em; }
        #app-screen { display: none; width: 100%; }
        
        /* 使用 Grid 讓 4 個按鈕完美對齊 */
        #mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; width: 100%; }
        
        .card { background: white; color: #2c3e50; height: 260px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; }
        .word-en { font-size: 1.55em; font-weight: bold; margin-bottom: 10px; min-height: 2.2em; display: flex; align-items: center; justify-content: center; word-break: break-word; line-height: 1.2; width: 100%; }
        .hidden { display: none !important; }
        
        .btn-speak { background: var(--accent); font-size: 2.2em; width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin: 15px 0; padding: 0; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .nav-btn { background: #7f8c8d; padding: 15px; border-radius: 10px; color: white; border: none; font-weight: bold; width: 100%; text-align: center; font-size: 1em; cursor: pointer; }
        .btn-back { background: #e74c3c; width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 10px; color: white; border: none; font-size: 1.1em; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body onpointerdown="initAudioContext()">

<div class="container" id="menu-screen">
    <h1 style="text-align: center; margin-bottom: 15px;">🚑 醫用單字排程</h1>
    
    <div class="settings-panel">

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
        <label>⚡ 語速調整: <span id="rate-val">0.9</span>x</label>

    </div>

    <div id="menu-items"></div>
</div>

<div class="container" id="app-screen">
    <button class="btn-back" onclick="location.reload()">← 返回選單</button>
    <div id="mode-selector"></div>
    
    <div class="card" onclick="reveal()">

    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; width:100%; gap:15px; margin-top:10px;">

        <button class="btn-speak" onclick="speak()">🔊</button>
        <button class="nav-btn" onclick="next()">▶</button>
    </div>
    <button class="nav-btn" style="background:#9b59b6; width:100%; margin-top:15px;" onclick="reveal()">👁️ 查看答案</button>
    <p id="progress" style="text-align:center; margin-top:20px; color:#bdc3c7; font-weight:bold;"></p>
</div>

    let targetVoice = null;

    function initAudioContext() {
        if (!targetVoice) {
            window.speechSynthesis.getVoices();
            loadVoices();
        }
    }

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) return;
        
        targetVoice = voices.find(v => v.name === 'Alex' || v.name.includes('Alex'));
        const statusEl = document.getElementById('voice-status');

        if (targetVoice) {
            statusEl.innerText = "IOS26使用者可至設定-輔助使用-閱讀與朗讀-聲音-英語-下載Tom(增強音質)-點擊設為預設";
            statusEl.style.color = "#2ecc71";
        } else {
            statusEl.innerText = "IOS26使用者可至設定-輔助使用-閱讀與朗讀-聲音-英語-下載Tom(增強音質)-點擊設為預設";
            statusEl.style.color = "#2ecc71";
        }
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    function getDates() {
        let list = []; let d = new Date(2026, 2, 17);
        for(let i=0; i<Math.ceil(allWords.length/15); i++) {
            list.push(`${d.getMonth()+1}/${d.getDate()}`);
            d.setDate(d.getDate() + (i % 2 === 0 ? 3 : 4));
        }
        return list;
    }

    const examDates = getDates();
    let batch = [], idx = 0, currentMode = '';

    function initMenu() {
        const container = document.getElementById('menu-items');
        for(let i=0; i<examDates.length; i++) {
            let div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `<b>${examDates[i]} 階段範圍</b><br><small>新增單字：${i*15+1} - ${Math.min((i+1)*15, allWords.length)}</small>`;
            div.onclick = (e) => { e.stopPropagation(); showMode(i); };
            container.appendChild(div);
        }
    }

    function showMode(i) {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        document.getElementById('mode-selector').innerHTML = `
            <button class="nav-btn" onclick="start('learn', ${i})">練習模式</button>
            <button class="nav-btn" onclick="start('recite', ${i})">背誦模式</button>
            <button class="nav-btn" onclick="start('random_recite', ${i})">亂數背誦</button>
            <button class="nav-btn" style="background:#e67e22;" onclick="start('exam', ${i})">考試模式</button>
        `;
    }

    function start(mode, i) {
        currentMode = mode;
        let startIdx = i * 15;
        let endIdx = Math.min((i + 1) * 15, allWords.length);
        
        // 依照四種模式分派邏輯
        if (mode === 'learn' || mode === 'recite') {
            // 僅本次新增 15 個，照順序
            batch = allWords.slice(startIdx, endIdx);
        } else if (mode === 'random_recite') {
            // 僅本次新增 15 個，亂數排列
            batch = allWords.slice(startIdx, endIdx).sort(() => Math.random() - 0.5);
        } else if (mode === 'exam') {
            // 累積從第 1 個到本次範圍的所有單字，亂數排列
            batch = allWords.slice(0, endIdx).sort(() => Math.random() - 0.5);
        }
        
        idx = 0; 
        updateUI();
        
        // 只有在非練習模式（背誦/考試）需要聽音辨字時，才自動發音
        if (mode !== 'learn') setTimeout(speak, 500);
    }

    function updateUI() {
        window.speechSynthesis.cancel();
        document.getElementById('q-en').innerText = batch[idx].en;
        document.getElementById('q-zh').innerText = batch[idx].zh;
        
        // 只要不是練習模式，一律先隱藏單字
        if (currentMode !== 'learn') {
            document.getElementById('q-en').classList.add('hidden');
            document.getElementById('q-zh').classList.add('hidden');
        } else {
            document.getElementById('q-en').classList.remove('hidden');
            document.getElementById('q-zh').classList.remove('hidden');
        }
        document.getElementById('progress').innerText = `${idx+1} / ${batch.length}`;
    }

    function reveal() { 
        document.getElementById('q-en').classList.remove('hidden');
        document.getElementById('q-zh').classList.remove('hidden');
    }

    function next() { 
        idx = (idx+1)%batch.length; 
        updateUI(); 
        if(currentMode !== 'learn') setTimeout(speak, 150); 
    }
    
    function prev() { 
        idx = (idx-1+batch.length)%batch.length; 
        updateUI(); 
        if(currentMode !== 'learn') setTimeout(speak, 150);
    }
    
    function speak() { 
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(batch[idx].en);
        
        if (targetVoice) {
            msg.voice = targetVoice;
        } else {
            msg.lang = 'en-US';
        }
        
        msg.rate = document.getElementById('rate-range').value;
        window.speechSynthesis.speak(msg); 
    }
    
    initMenu();
</script>
</body>
</html>
