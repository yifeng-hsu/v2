        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; }
        .container { width: 100%; max-width: 500px; }
        
        .settings-panel { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; text-align: center; }
        input[type="range"] { width: 100%; margin: 15px 0 5px 0; -webkit-appearance: none; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #7f8c8d; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%; background: var(--accent); margin-top: -9px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        label { font-size: 0.95em; color: #bdc3c7; font-weight: bold; display: block; }
        #voice-status { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; color: #f1c40f; }
        
        .menu-item { background: white; color: #2c3e50; padding: 18px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; border-left: 6px solid var(--primary); font-size: 1.1em; position: relative; }
        #app-screen { display: none; width: 100%; }
        
        #mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; width: 100%; }
        
        .card { background: white; color: #2c3e50; height: 260px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; position: relative; }
        .word-en { font-size: 1.55em; font-weight: bold; margin-bottom: 10px; min-height: 2.2em; display: flex; align-items: center; justify-content: center; word-break: break-word; line-height: 1.2; width: 100%; flex-wrap: wrap; gap: 0.2em; }
        .hidden { visibility: hidden; }
        
        .btn-speak { background: var(--accent); font-size: 2.2em; width: 50px; height: 50px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin: 15px 0; padding: 0; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .nav-btn { background: #7f8c8d; padding: 15px; border-radius: 10px; color: white; border: none; font-weight: bold; width: 100%; text-align: center; font-size: 1em; cursor: pointer; }
        .btn-back { background: #e74c3c; width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 10px; color: white; border: none; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        
        .star-btn { position: absolute; top: 15px; right: 15px; font-size: 2em; color: #ccc; cursor: pointer; transition: 0.2s; z-index: 10; }
        .star-btn.active { color: var(--star); }
    </style>
</head>

        {en:"Skull Fracture",zh:"顱骨骨折"},
        {en:"Smoke Inhalation injury",zh:"煙霧吸入傷害"},
        {en:"Snake bite",zh:"蛇咬傷"},
        {en:"Spinal Cord injury",zh:"脊髓損傷"},
        {en:"Spleen rupture",zh:"脾臟破裂"},
        {en:"Spontaneous Pneumothorax",zh:"自發性氣胸"},
        {en:"Sprain",zh:"扭傷"},
        {en:"Stabbing wound",zh:"穿刺傷"},
        {en:"Stool impaction",zh:"糞便嵌塞"},
        {en:"Strain",zh:"拉傷"},
        {en:"Subarachnoid Hemorrhage",zh:"蜘蛛膜下出血(SAH)"},
        {en:"Subcutaneous emphysema",zh:"皮下氣腫"},
        {en:"Subdural Hemorrhage",zh:"硬腦膜下出血(SDH)"},
        {en:"Suicide",zh:"自殺"},
        {en:"Syncope",zh:"暈厥"},
        {en:"Systemic Lupus Erythematosus",zh:"紅斑性狼瘡(SLE)"},
        {en:"Tarry stool",zh:"柏油樣便"},
        {en:"Tension Pneumothorax",zh:"張力性氣胸"},
        {en:"Tetanus",zh:"破傷風"},
        {en:"Thermal Burn",zh:"熱灼傷"},
        {en:"Thrombocytopenia",zh:"血小板減少症"},
        {en:"Thrombophlebitis",zh:"血栓性靜脈炎"},
        {en:"Tibial fracture",zh:"脛骨骨折"},
        {en:"Tongue cancer",zh:"舌癌"},
        {en:"Tonsillitis",zh:"扁桃腺炎"},
        {en:"Tracheal Rupture",zh:"氣管破裂"},
        {en:"Traffic Accident",zh:"交通事故(TA)"},
        {en:"Transient Ischemic Attack",zh:"短暫性缺血症發作(TIA)"},
        {en:"Trauma",zh:"外傷"},
        {en:"Tuberculosis",zh:"結核病(TB)"},
        {en:"Ulnar Fracture",zh:"尺骨骨折"},
        {en:"Ulnar nerve injury",zh:"尺神經受損"},
        {en:"Unstable Angina",zh:"不穩定性心絞痛"},
        {en:"Upper Gastrointestinal bleeding",zh:"上腸胃道出血(UGI bleeding)"},
        {en:"Uremia",zh:"尿毒症"},
        {en:"Ureter stone",zh:"輸尿管結石"},
        {en:"Urethral stone",zh:"尿道結石"},
        {en:"Urinary retention",zh:"尿儲留"},
        {en:"Urinary Tract Infection",zh:"尿路感染(UTI)"},
        {en:"Urolithiasis",zh:"尿路結石"},
        {en:"Urticaria",zh:"蕁麻疹"},
        {en:"Vaginal Bleeding",zh:"陰道出血"},
        {en:"Vaginitis",zh:"陰道炎"},
        {en:"Varicose Vein",zh:"靜脈曲張"},
        {en:"Ventricular Fibrillation",zh:"心室顫動(Vf)"},
        {en:"Ventricular Flutter",zh:"心室撲動(VF)"},
        {en:"Ventricular Tachycardia",zh:"心室心搏過速(VT)"},
        {en:"Vertigo",zh:"眩暈"},
        {en:"Viral Infection",zh:"病毒感染"},
        {en:"Vomiting",zh:"嘔吐"},
        {en:"Wrist sprain",zh:"腕部扭傷"},
        {en:"Zygomatic Fracture",zh:"顴骨骨折"}
    ];

    let targetVoice = null;
    let starredWords = JSON.parse(localStorage.getItem('starredWords') || "[]");

    function initAudioContext() {
        if (!targetVoice) {
            window.speechSynthesis.getVoices();
            loadVoices();
        }
    }

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) return;
        targetVoice = voices.find(v => v.name === 'Alex' || v.name.includes('Alex'));
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    function getDates() {
        let list = []; let d = new Date(2026, 2, 17);
        for(let i=0; i<Math.ceil(allWords.length/15); i++) {
            list.push(`${d.getMonth()+1}/${d.getDate()}`);
            d.setDate(d.getDate() + (i % 2 === 0 ? 3 : 4));
        }
        return list;
    }

    const examDates = getDates();
    let batch = [], idx = 0, currentMode = '';

    function initMenu() {
        const container = document.getElementById('menu-items');
        container.innerHTML = "";
        
        const starEntry = document.getElementById('star-mode-entry');
        if (starredWords.length > 0) {
            starEntry.style.display = 'block';
            document.getElementById('star-info').innerText = `目前標記了 ${starredWords.length} 個單字`;
        } else {
            starEntry.style.display = 'none';
        }

        for(let i=0; i<examDates.length; i++) {
            let div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `<b>${examDates[i]} 階段範圍</b><br><small>單字：${i*15+1} - ${Math.min((i+1)*15, allWords.length)}</small>`;
            div.onclick = (e) => { e.stopPropagation(); showMode(i); };
            container.appendChild(div);
        }
    }

    function showMode(i) {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        
        // 檢查當前範圍內有多少弱項單字
        let startIdx = i * 15;
        let endIdx = Math.min((i + 1) * 15, allWords.length);
        let currentRangeWords = allWords.slice(startIdx, endIdx);
        let rangeStarCount = currentRangeWords.filter(w => starredWords.includes(w.en)).length;

        let modeHtml = `
            <button class="nav-btn" onclick="start('learn', ${i})">練習模式</button>
            <button class="nav-btn" onclick="start('recite', ${i})">背誦模式</button>
            <button class="nav-btn" onclick="start('random_recite', ${i})">亂數背誦</button>
            <button class="nav-btn" style="background:#e67e22;" onclick="start('exam', ${i})">考試模式</button>
        `;

        // 如果本區有弱項，增加本區特訓按鈕
        if(rangeStarCount > 0) {
            modeHtml += `
                <button class="nav-btn" style="background:#f1c40f; color:#2c3e50; grid-column: span 2;" 
                onclick="start('range_star', ${i})">⭐ 本區弱項特訓 (${rangeStarCount})</button>
            `;
        }

        document.getElementById('mode-selector').innerHTML = modeHtml;
    }

    function startStarMode() {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        document.getElementById('mode-selector').innerHTML = `<h3 style="grid-column: span 2; text-align:center; color:var(--star);">🔥 全範圍弱項總複習</h3>`;
        currentMode = 'random_recite';
        batch = allWords.filter(w => starredWords.includes(w.en)).sort(() => Math.random() - 0.5);
        idx = 0;
        updateUI();
        setTimeout(speak, 500);
    }

    function start(mode, i) {
        currentMode = mode;
        let startIdx = i * 15;
        let endIdx = Math.min((i + 1) * 15, allWords.length);
        
        if (mode === 'learn' || mode === 'recite') {
            batch = allWords.slice(startIdx, endIdx);
        } else if (mode === 'random_recite') {
            batch = allWords.slice(startIdx, endIdx).sort(() => Math.random() - 0.5);
        } else if (mode === 'exam') {
            batch = allWords.slice(0, endIdx).sort(() => Math.random() - 0.5);
        } else if (mode === 'range_star') {
            // 只抓當前範圍內的星號單字
            let rangeWords = allWords.slice(startIdx, endIdx);
            batch = rangeWords.filter(w => starredWords.includes(w.en)).sort(() => Math.random() - 0.5);
            currentMode = 'random_recite'; // 設定為背誦邏輯
        }
        
        idx = 0; 
        updateUI();
        if (currentMode !== 'learn') setTimeout(speak, 500);
    }

    function updateUI() {
        window.speechSynthesis.cancel();
        if (batch.length === 0) return;
        const currentWord = batch[idx];
        
        const qEn = document.getElementById('q-en');
        qEn.innerHTML = '';
        const words = currentWord.en.split(' ');
        words.forEach((wordText, wordIndex) => {
            const span = document.createElement('span');
            span.innerText = wordText;
            span.style.cursor = 'pointer';
            span.onclick = function(e) {
                e.stopPropagation();
                speakWord(wordText);
            };
            qEn.appendChild(span);
            if (wordIndex < words.length - 1) {
                qEn.appendChild(document.createTextNode(' '));
            }
        });

        document.getElementById('q-zh').innerText = currentWord.zh;
        
        const starBtn = document.getElementById('star-toggle');
        if (starredWords.includes(currentWord.en)) {
            starBtn.classList.add('active');
            starBtn.innerText = '★';
        } else {
            starBtn.classList.remove('active');
            starBtn.innerText = '☆';
        }

        if (currentMode !== 'learn') {
            document.getElementById('q-en').classList.add('hidden');
            document.getElementById('q-zh').classList.add('hidden');
        } else {
            document.getElementById('q-en').classList.remove('hidden');
            document.getElementById('q-zh').classList.remove('hidden');
        }
        document.getElementById('progress').innerText = `${idx+1} / ${batch.length}`;
    }

    function toggleStar(e) {
        e.stopPropagation();
        const wordEn = batch[idx].en;
        const sIdx = starredWords.indexOf(wordEn);
        if (sIdx > -1) starredWords.splice(sIdx, 1);
        else starredWords.push(wordEn);
        localStorage.setItem('starredWords', JSON.stringify(starredWords));
        updateUI();
    }

    function reveal() { 
        document.getElementById('q-en').classList.remove('hidden');
        document.getElementById('q-zh').classList.remove('hidden');
    }

    function next() { 
        if (batch.length === 0) return;
        idx = (idx+1)%batch.length; 
        updateUI(); 
        if(currentMode !== 'learn') setTimeout(speak, 150); 
    }
    
    function prev() { 
        if (batch.length === 0) return;
        idx = (idx-1+batch.length)%batch.length; 
        updateUI(); 
        if(currentMode !== 'learn') setTimeout(speak, 150);
    }
    
    function speak() { 
        if (batch.length === 0) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(batch[idx].en);
        if (targetVoice) msg.voice = targetVoice; else msg.lang = 'en-US';
        msg.rate = document.getElementById('rate-range').value;
        window.speechSynthesis.speak(msg);
    }

    function speakWord(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        if (targetVoice) msg.voice = targetVoice; else msg.lang = 'en-US';
        msg.rate = document.getElementById('rate-range').value;
        window.speechSynthesis.speak(msg);
    }
    
    initMenu();
</script>
</body>
</html>
