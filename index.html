<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        :root { --primary: #3498db; --bg: #2c3e50; --accent: #2ecc71; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; }
        .container { width: 100%; max-width: 500px; }
        
        .settings-panel { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); width: 100%; text-align: center; }
        input[type="range"] { width: 100%; margin: 15px 0 5px 0; -webkit-appearance: none; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #7f8c8d; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%; background: var(--accent); margin-top: -9px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        label { font-size: 1em; color: #bdc3c7; font-weight: bold; }
        
        .menu-item { background: white; color: #2c3e50; padding: 18px; margin-bottom: 12px; border-radius: 12px; cursor: pointer; border-left: 6px solid var(--primary); font-size: 1.1em; }
        #app-screen { display: none; width: 100%; }
        
        .card { background: white; color: #2c3e50; height: 260px; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; }
        .word-en { font-size: 1.8em; font-weight: bold; margin-bottom: 10px; min-height: 2.2em; display: flex; align-items: center; }
        .hidden { display: none !important; }
        
        .btn-speak { background: var(--accent); font-size: 2.2em; width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin: 15px 0; padding: 0; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .nav-btn { background: #7f8c8d; padding: 15px; border-radius: 10px; color: white; border: none; font-weight: bold; flex: 1; text-align: center; font-size: 1em; cursor: pointer; }
        .btn-back { background: #e74c3c; width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 10px; color: white; border: none; font-size: 1.1em; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="menu-screen">
    <h1 style="text-align: center; margin-bottom: 15px;">🚑 醫用單字排程</h1>
    
    <div class="settings-panel">
        <label>☁️ 雲端美式發音 (全裝置統一)</label>
        <div style="margin-top: 20px;">
            <label>⚡ 語速調整: <span id="rate-val">0.9</span>x</label>
            <input type="range" id="rate-range" min="0.5" max="1.5" step="0.1" value="0.9" oninput="document.getElementById('rate-val').innerText=this.value">
        </div>
    </div>

    <div id="menu-items"></div>
</div>

<div class="container" id="app-screen">
    <button class="btn-back" onclick="location.reload()">← 返回選單</button>
    <div id="mode-selector" style="display:flex; gap:10px; margin-bottom:15px; width:100%;"></div>
    
    <div class="card" onclick="reveal()">
        <div class="word-en" id="q-en">EN</div>
        <div class="word-zh" style="font-size:1.4em; color:#34495e;" id="q-zh">ZH</div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; width:100%; gap:15px; margin-top:10px;">
        <button class="nav-btn" onclick="prev()">◀ 上一題</button>
        <button class="btn-speak" onclick="speak()">🔊</button>
        <button class="nav-btn" onclick="next()">下一題 ▶</button>
    </div>
    <button class="nav-btn" style="background:#9b59b6; width:100%; margin-top:15px;" onclick="reveal()">👁️ 查看答案</button>
    <p id="progress" style="text-align:center; margin-top:20px; color:#bdc3c7; font-weight:bold;"></p>
</div>

    let currentAudio = null;

    function getDates() {
        let list = []; let d = new Date(2026, 2, 17);
        for(let i=0; i<Math.ceil(allWords.length/15); i++) {
            list.push(`${d.getMonth()+1}/${d.getDate()}`);
            d.setDate(d.getDate() + (i % 2 === 0 ? 3 : 4));
        }
        return list;
    }

    const examDates = getDates();
    let batch = [], idx = 0, currentMode = '';

    function initMenu() {
        const container = document.getElementById('menu-items');
        for(let i=0; i<examDates.length; i++) {
            let div = document.createElement('div');
            div.className = 'menu-item';
            div.innerHTML = `<b>${examDates[i]} 階段範圍</b><br><small>單字：${i*15+1} - ${Math.min((i+1)*15, allWords.length)}</small>`;
            div.onclick = () => showMode(i);
            container.appendChild(div);
        }
    }

    function showMode(i) {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        document.getElementById('mode-selector').innerHTML = `
            <button class="nav-btn" onclick="start('learn', ${i})">學習</button>
            <button class="nav-btn" onclick="start('recite', ${i})">背誦</button>
            <button class="nav-btn" style="background:#e67e22;" onclick="start('exam', ${i})">考試</button>
        `;
    }

    function start(mode, i) {
        currentMode = mode;
        let endIdx = Math.min((i + 1) * 15, allWords.length);
        batch = (mode === 'exam') ? allWords.slice(0, endIdx).sort(() => Math.random() - 0.5) : allWords.slice(i * 15, endIdx);
        idx = 0; updateUI();
        if (mode === 'exam') setTimeout(speak, 300);
    }

    function updateUI() {
        if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
        
        document.getElementById('q-en').innerText = batch[idx].en;
        document.getElementById('q-zh').innerText = batch[idx].zh;
        
        if (currentMode === 'exam' || currentMode === 'recite') {
            document.getElementById('q-en').classList.add('hidden');
            document.getElementById('q-zh').classList.add('hidden');
        } else {
            document.getElementById('q-en').classList.remove('hidden');
            document.getElementById('q-zh').classList.remove('hidden');
        }
        document.getElementById('progress').innerText = `${idx+1} / ${batch.length}`;
    }

    function reveal() { 
        document.getElementById('q-en').classList.remove('hidden');
        document.getElementById('q-zh').classList.remove('hidden');
    }

    function next() { idx = (idx+1)%batch.length; updateUI(); if(currentMode === 'exam') setTimeout(speak, 100); }
    function prev() { idx = (idx-1+batch.length)%batch.length; updateUI(); }
    
    function speak() { 
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }
        
        // 使用有道公開字典 API 取得美式發音 (type=2 代表美音)
        const word = encodeURIComponent(batch[idx].en);
        const url = `https://dict.youdao.com/dictvoice?audio=${word}&type=2`;
        
        currentAudio = new Audio(url);
        currentAudio.playbackRate = parseFloat(document.getElementById('rate-range').value);
        currentAudio.play().catch(e => console.log("播放被瀏覽器阻擋，請確認有互動操作", e));
    }
    
    initMenu();
</script>
</body>
</html>
